<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramadan Quiz Competition</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
padding:20px;
}

.container{
background:white;
color:#222;
padding:40px;
border-radius:15px;
width:100%;
max-width:420px;
box-shadow:0 15px 35px rgba(0,0,0,0.4);
}

.logo-box{
width:100%;
padding:10px 35px 20px 35px;
display:flex;
justify-content:center;
}

.logo-box img{
width:100%;
height:auto;
object-fit:contain;
}

h1{
margin-bottom:5px;
}

.subtitle{
margin-bottom:25px;
font-size:14px;
color:#666;
}

#countdownBox{
margin-top:10px;
}

#launchText{
font-size:18px;
margin-bottom:10px;
}

#timer{
font-size:34px;
font-weight:bold;
letter-spacing:2px;
color:#e74c3c;
margin-bottom:20px;
}

.button{
display:block;
width:100%;
padding:15px;
margin:12px 0;
font-size:17px;
border:none;
border-radius:8px;
cursor:pointer;
color:white;
transition:0.25s;
}

.kids{background:#27ae60;}
.junior{background:#f39c12;}
.senior{background:#e74c3c;}
.parents{background:#8e44ad;}

.button:hover{
transform:scale(1.04);
opacity:0.9;
}

.footer{
margin-top:15px;
font-size:12px;
color:#777;
}

</style>
</head>

<body>

<div class="container">

<div class="logo-box">
<img src="logo.png" alt="School Logo">
</div>

<h1>Ramadan Quiz Competition</h1>
<p class="subtitle">RAYYAN RAMADAN CAMPAIGN</p>

<!-- Countdown Screen -->
<div id="countdownBox">

<div id="launchText">
Quiz will start at <b>4:00 PM IST</b>
</div>

<div id="timer">
Loading...
</div>

</div>

<!-- Quiz Buttons (Hidden initially) -->
<div id="quizContent" style="display:none;">

<button class="button kids"
onclick="openForm('https://forms.gle/4Gc8YQFXfLxYdQ6q8')">
Category 01<br>(Class 1 - 4)
</button>

<button class="button junior"
onclick="openForm('https://forms.gle/dhzeTovhiM8qvsJT7')">
Category 02<br>(Class 5 - 7)
</button>

<button class="button senior"
onclick="openForm('https://forms.gle/2JYeLDC9KSk3bfUP6')">
Category 03<br>(Class 8 - 10)
</button>

<button class="button parents"
onclick="openForm('PARENTS_FORM_LINK')">
Parents
</button>

<div class="footer">
Choose the correct category before starting the quiz
</div>

</div>

</div>

<script>

function openForm(link){
window.location.href = link;
}

/* SET QUIZ START TIME HERE */
const startTime = new Date("2026-03-12T13:43:00+05:30").getTime();

const timer = setInterval(function(){

const now = new Date().getTime();
const distance = startTime - now;

if(distance <= 0){

clearInterval(timer);

document.getElementById("countdownBox").style.display="none";
document.getElementById("quizContent").style.display="block";

return;

}

const hours = Math.floor(distance/(1000*60*60));
const minutes = Math.floor((distance%(1000*60*60))/(1000*60));
const seconds = Math.floor((distance%(1000*60))/1000);

document.getElementById("timer").innerHTML =
hours+"h "+minutes+"m "+seconds+"s";

},1000);

</script>

</body>
</html>
