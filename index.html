<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramadan Quiz Competition</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
padding:20px;
}

.container{
background:white;
color:#222;
padding:40px;
border-radius:15px;
width:100%;
max-width:420px;
box-shadow:0 15px 35px rgba(0,0,0,0.4);
}

.logo-box{
width:100%;
padding:10px 35px 20px 35px;
display:flex;
justify-content:center;
}

.logo-box img{
width:100%;
height:auto;
object-fit:contain;
}

h1{
margin-bottom:5px;
}

.subtitle{
margin-bottom:20px;
font-size:14px;
color:#666;
}

.message{
margin:15px 0;
font-size:16px;
}

#timer{
font-size:34px;
font-weight:bold;
letter-spacing:2px;
color:#e74c3c;
margin:15px 0;
}

.button{
display:block;
width:100%;
padding:15px;
margin:12px 0;
font-size:17px;
border:none;
border-radius:8px;
cursor:pointer;
color:white;
transition:0.25s;
}

.kids{background:#27ae60;}
.junior{background:#f39c12;}
.senior{background:#e74c3c;}
.parents{background:#8e44ad;}

.disabled{
background:#aaa !important;
opacity:0.6;
cursor:not-allowed;
}

.button:hover{
transform:scale(1.04);
opacity:0.9;
}

.footer{
margin-top:15px;
font-size:12px;
color:#777;
display:none;
}

</style>
</head>

<body>

<div class="container">

<div class="logo-box">
<img src="logo.png" alt="School Logo">
</div>

<h1>Ramadan Quiz Competition</h1>
<p class="subtitle">RAYYAN RAMADAN CAMPAIGN</p>

<div id="messageBox" class="message"></div>
<div id="timer"></div>

<div id="buttons"></div>

<div class="footer" id="footerNote">
Choose the correct category before starting the quiz
</div>

</div>

<script>

function openForm(link){
window.location.href = link;
}

const student1="https://forms.gle/4Gc8YQFXfLxYdQ6q8";
const student2="https://forms.gle/dhzeTovhiM8qvsJT7";
const student3="https://forms.gle/2JYeLDC9KSk3bfUP6";
const parents="https://forms.gle/dfezxnL9ci6AmeCSA";

const studentsStart = new Date("2026-03-14T16:00:00+05:30").getTime();
const studentsEnd = new Date("2026-03-14T16:20:00+05:30").getTime();
const parentsStart = new Date("2026-03-14T16:30:00+05:30").getTime();
const quizEnd = new Date("2026-03-14T16:50:00+05:30").getTime();

function updatePage(){

const now = new Date().getTime();

const msg = document.getElementById("messageBox");
const timer = document.getElementById("timer");
const buttons = document.getElementById("buttons");
const footer = document.getElementById("footerNote");

if(now < studentsStart){

msg.innerHTML="Quiz will start at <b>4:00 PM IST</b><br>Parents Quiz will start at <b>4:30 PM IST</b>";

let distance=studentsStart-now;

showTimer(distance);

buttons.innerHTML="";
footer.style.display="none";

}

else if(now >= studentsStart && now < studentsEnd){

msg.innerHTML="";
timer.innerHTML="";
footer.style.display="block";

buttons.innerHTML=`

<button class="button kids" onclick="openForm('${student1}')">
Category 01<br>(Class 1 - 4)
</button>

<button class="button junior" onclick="openForm('${student2}')">
Category 02<br>(Class 5 - 7)
</button>

<button class="button senior" onclick="openForm('${student3}')">
Category 03<br>(Class 8 - 10)
</button>

<button class="button parents disabled">
Parents<br>(at 4:30 PM)
</button>

`;

}

else if(now >= studentsEnd && now < parentsStart){

msg.innerHTML="Students Quiz Time is Over<br>Parents Quiz will start in:";

let distance=parentsStart-now;

showTimer(distance);

buttons.innerHTML="";
footer.style.display="none";

}

else if(now >= parentsStart && now < quizEnd){

msg.innerHTML="";
timer.innerHTML="";
footer.style.display="none";

buttons.innerHTML=`

<button class="button parents" onclick="openForm('${parents}')">
Parents Quiz
</button>

`;

}

else{

msg.innerHTML="<b>Quiz Over</b>";
timer.innerHTML="";
buttons.innerHTML="";
footer.style.display="none";

}

}

function showTimer(distance){

const timer = document.getElementById("timer");

const hours=Math.floor(distance/(1000*60*60));
const minutes=Math.floor((distance%(1000*60*60))/(1000*60));
const seconds=Math.floor((distance%(1000*60))/1000);

timer.innerHTML=hours+"h "+minutes+"m "+seconds+"s";

}

setInterval(updatePage,1000);

updatePage();

</script>

</body>
</html>
